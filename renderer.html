<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PlusOne Bay Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
      user-select: none;
      cursor: default;
    }

    /* ── Setup screen ── */
    #setupScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0a0a0a;
      border-radius: 12px;
      overflow: hidden;
      z-index: 500;
    }
    .setup-drag {
      width: 100%;
      height: 36px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .setup-drag-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.12);
    }
    .setup-body {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      padding: 4px 0 28px;
    }
    .setup-logo {
      margin-bottom: 12px;
    }
    .setup-logo img {
      height: 64px;
      width: auto;
    }
    .setup-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 4px;
    }
    .setup-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 24px;
    }

    /* summary card */
    .setup-summary-card {
      width: 400px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 6px 0;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      width: 52px;
      flex-shrink: 0;
    }
    .summary-value {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    /* setup buttons */
    .setup-btn {
      width: 400px;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
      -webkit-app-region: no-drag;
    }
    .setup-btn:hover { background: #1d4ed8; }
    .setup-link {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-decoration: underline;
      cursor: pointer;
      border: none;
      background: none;
      -webkit-app-region: no-drag;
      transition: color 0.15s;
    }
    .setup-link:hover { color: rgba(255,255,255,0.65); }

    /* setup form */
    .setup-form-wrap {
      width: 400px;
    }

    /* ── Status indicator (kiosk mode only) ── */
    .status {
      position: fixed;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .status-dot.online { background: #22c55e; }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Timer bar ── */
    .timer-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      z-index: 300;
    }
    .timer-bar .timer-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
    }
    .timer-bar .timer-value {
      font-family: 'Consolas', 'Segoe UI', monospace;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }
    .timer-bar .timer-value.warning { color: #f59e0b; }
    .timer-bar .timer-value.critical {
      color: #ef4444;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Notify bar ── */
    .notify-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      z-index: 300;
      padding: 0 12px;
    }
    .notify-bar .notify-icon { flex-shrink: 0; font-size: 16px; }
    .notify-bar .notify-text {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .notify-bar .notify-timer {
      font-family: 'Consolas', 'Segoe UI', monospace;
      font-size: 15px;
      font-weight: 700;
      color: #f59e0b;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-left: auto;
    }

    /* ── HUD ── */
    .hud {
      position: fixed;
      top: 16px;
      right: 16px;
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 18px;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hud-label { color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 500; }
    .hud-time { font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'Consolas', 'Segoe UI', monospace; letter-spacing: 0.02em; }

    /* ── Lock screen ── */
    .lock-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 50;
      background: #0a0a0a;
    }
    .lock-logo { margin-bottom: 32px; }
    .lock-logo img { height: 100px; width: auto; }
    .lock-title { font-size: 52px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .lock-sub { font-size: 16px; color: rgba(255,255,255,0.5); max-width: 400px; text-align: center; line-height: 1.5; }

    /* ── Next reservation ── */
    .next-reservation {
      margin-top: 28px;
      padding: 16px 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
    }
    .next-reservation-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .next-reservation-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .next-reservation-time { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* ── PIN dots ── */
    .pin-dots { display: flex; gap: 8px; margin-top: 24px; opacity: 0; transition: opacity 0.3s; }
    .pin-dots.active { opacity: 1; }
    .pin-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled { background: #fff; border-color: #fff; }
    .pin-dot.error  { background: #ef4444; border-color: #ef4444; }

    .pin-error-msg {
      font-size: 12px;
      color: #ef4444;
      margin-top: 10px;
      min-height: 18px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pin-error-msg.visible { opacity: 1; }

    /* ── Shared form styles (used in setup screen) ── */
    .config {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
    }
    .config-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .config input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .config input:focus { border-color: rgba(255,255,255,0.25); }
    .config input::placeholder { color: rgba(255,255,255,0.25); }
    .config button.primary {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .config button.primary:hover { background: #1d4ed8; }
    .config-divider {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin: 12px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .config-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }
    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .input-row input {
      margin-bottom: 0 !important;
      flex: 1;
      min-width: 0;
    }
    .browse-btn {
      flex-shrink: 0;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
      height: 40px;
    }
    .browse-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); color: #fff; }

    /* ── Reconfigure link (lock screen) ── */
    .reconfigure-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.12);
      text-decoration: underline;
      cursor: pointer;
      border: none;
      background: none;
    }
    .reconfigure-link:hover { color: rgba(255,255,255,0.35); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       SETUP SCREEN (shown on first launch)
  ══════════════════════════════════════════ -->
  <div id="setupScreen">
    <div class="setup-drag"><div class="setup-drag-handle"></div></div>

    <div class="setup-body">
      <div class="setup-logo">
        <img src="logo.png" alt="The Bogey Factory" />
      </div>
      <div class="setup-title">Bay Agent</div>
      <div class="setup-sub">Configure this bay and connect to the control room</div>

      <!-- Summary view (shown when saved config exists) -->
      <div id="setupSummary" class="hidden">
        <div class="setup-summary-card">
          <div class="summary-row">
            <span class="summary-label">Server</span>
            <span class="summary-value" id="summaryServer"></span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Bay</span>
            <span class="summary-value" id="summaryBay"></span>
          </div>
          <div class="summary-row" id="summaryTpsRow">
            <span class="summary-label">TPS</span>
            <span class="summary-value" id="summaryTps"></span>
          </div>
        </div>
        <button id="connectBtn" class="setup-btn">Connect</button>
        <button id="editSettingsBtn" class="setup-link">Edit Settings</button>
      </div>

      <!-- Full form view -->
      <div id="setupFormWrap" class="hidden">
        <div class="config setup-form-wrap">
          <div class="config-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Bay Configuration
          </div>
          <input type="text" id="serverUrl" placeholder="Server URL (e.g. https://your-app.replit.app)" />
          <input type="text" id="bayName" placeholder="Bay Name (e.g. Bay-1)" />
          <input type="text" id="facilityId" placeholder="Facility ID (e.g. 2)" />
          <div class="config-divider">TrackMan / TPS</div>
          <div class="input-row">
            <input type="text" id="tpsPath" placeholder='TPS executable (e.g. C:\TrackMan\TPS.exe)' />
            <button class="browse-btn" id="browseBtn" type="button">Browse</button>
          </div>
          <input type="text" id="tpsProcessName" placeholder="TPS process name without .exe (e.g. TPS)" />
          <div class="config-divider">Display Control</div>
          <div class="input-row">
            <input type="text" id="nircmdPath" placeholder="Optional — leave blank to use bundled nircmd" />
            <button class="browse-btn" id="browseNircmd" type="button">Browse</button>
          </div>
          <button id="saveConnect" class="primary">Save &amp; Connect</button>
        </div>
        <div style="text-align:center; margin-top:10px;">
          <button id="backToSummaryBtn" class="setup-link hidden">← Back to summary</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       KIOSK ELEMENTS (hidden until connected)
  ══════════════════════════════════════════ -->

  <!-- Connection status -->
  <div class="status" id="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">DISCONNECTED</span>
  </div>

  <!-- Timer bar -->
  <div class="timer-bar" id="timerBar">
    <span class="timer-label">Time Left</span>
    <span class="timer-value" id="timerBarValue">&mdash;</span>
  </div>

  <!-- Notify bar -->
  <div class="notify-bar" id="notifyBar">
    <span class="notify-icon" id="notifyIcon">&#9888;</span>
    <span class="notify-text" id="notifyText"></span>
    <span class="notify-timer" id="notifyTimer"></span>
  </div>

  <!-- HUD (fallback) -->
  <div class="hud" id="hud">
    <span class="hud-label">Time Left</span>
    <span class="hud-time" id="timeLeft">&mdash;</span>
  </div>

  <!-- Lock screen -->
  <div class="lock-screen hidden" id="lockScreen">
    <div class="lock-logo">
      <img src="logo.png" alt="The Bogey Factory" />
    </div>
    <div class="lock-title">LOCKED</div>
    <div class="lock-sub" id="lockedMsg">Your Session Has Ended</div>

    <div class="next-reservation hidden" id="nextReservation">
      <div class="next-reservation-label">Up Next</div>
      <div class="next-reservation-name" id="nextResName"></div>
      <div class="next-reservation-time" id="nextResTime"></div>
    </div>

    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pinDot0"></div>
      <div class="pin-dot" id="pinDot1"></div>
      <div class="pin-dot" id="pinDot2"></div>
      <div class="pin-dot" id="pinDot3"></div>
    </div>
    <div class="pin-error-msg" id="pinErrorMsg">Incorrect code, please try again</div>

    <button class="reconfigure-link hidden" id="reconfigureBtn">Settings</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
